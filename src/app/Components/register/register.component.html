<div
  class="flex flex-col items-center justify-center min-h-screen bg-gray-50 space-y-6"
>
  <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>

  <div
    *ngIf="msg$ | async as currentMsg"
    class="w-full max-w-xs flex items-center p-4 mb-4 text-red-800 border-l-4 border-red-500 bg-red-50 animate-shake shadow-md"
    role="alert"
  >
    <svg class="flex-shrink-0 w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
      <path
        fill-rule="evenodd"
        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
        clip-rule="evenodd"
      ></path>
    </svg>

    <div class="ml-3 text-sm font-bold">
      {{ currentMsg }}
    </div>
  </div>

  <form
    (ngSubmit)="register()"
    #registerForm="ngForm"
    class="w-full max-w-xs flex flex-col space-y-4"
  >
    <input
      name="email"
      type="email"
      placeholder="Username"
      [(ngModel)]="registerData.email"
      required
      email
      autocomplete="off"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <input
      name="password"
      type="password"
      placeholder="Password"
      [(ngModel)]="registerData.password"
      required
      minlength="6"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <input
      name="confirmPassword"
      type="password"
      placeholder="Confirm Password"
      [(ngModel)]="registerData.confirmPassword"
      required
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <div class="text-right text-sm">
      Already have an account?
      <a routerLink="/login" class="text-blue-600 hover:text-black transition"
        >Login here!</a
      >
    </div>

    <button
      type="submit"
      class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition cursor-pointer"
    >
      Sign Up
    </button>
  </form>
</div>
