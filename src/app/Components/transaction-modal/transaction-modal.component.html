<div
  *ngIf="isOpen"
  (click)="close.emit()"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in"
>
  <div
    (click)="$event.stopPropagation()"
    class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-scale-in"
  >
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-800">New Transaction</h2>
      <button
        (click)="close.emit()"
        class="text-gray-400 hover:text-gray-600 transition"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div
      *ngIf="msg$ | async as currentMsg"
      class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-bold"
    >
      {{ currentMsg }}
    </div>

    <div class="space-y-5">
      <div>
        <label
          class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1"
          >Type</label
        >
        <div class="flex space-x-3 mt-1">
          <button
            (click)="selectedType = 'expense'; selectedCategory = ''"
            class="flex-1 py-3 rounded-xl font-bold border transition-all"
            [ngClass]="
              selectedType === 'expense'
                ? 'bg-red-500 border-red-500 text-white shadow-lg shadow-red-100'
                : 'bg-gray-50 border-gray-100 text-gray-400'
            "
          >
            Expense
          </button>
          <button
            (click)="selectedType = 'income'; selectedCategory = ''"
            class="flex-1 py-3 rounded-xl font-bold border transition-all"
            [ngClass]="
              selectedType === 'income'
                ? 'bg-green-500 border-green-500 text-white shadow-lg shadow-green-100'
                : 'bg-gray-50 border-gray-100 text-gray-400'
            "
          >
            Income
          </button>
        </div>
      </div>

      <div>
        <label
          class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1"
          >Category</label
        >
        <select
          [(ngModel)]="selectedCategory"
          [disabled]="!selectedType"
          class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:opacity-50"
        >
          <option value="" disabled>Select a category</option>
          <option *ngFor="let cat of currentCategories" [value]="cat">
            {{ cat }}
          </option>
        </select>
      </div>

      <div>
        <label
          class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1"
          >Amount</label
        >
        <input
          [(ngModel)]="amount"
          type="number"
          placeholder="0.00"
          class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
        />
      </div>

      <button
        (click)="handleTransaction()"
        class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none disabled:cursor-not-allowed"
      >
        Add Transaction
      </button>
    </div>
  </div>
</div>
