<div
  *ngIf="isOpen"
  (click)="close.emit()"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in"
>
  <div
    (click)="$event.stopPropagation()"
    class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-scale-in"
  >
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-800">Delete Transaction</h2>
      <button
        (click)="close.emit()"
        class="text-gray-400 hover:text-gray-600 transition"
      >
        ✕
      </button>
    </div>

    <div class="mb-6 text-sm text-gray-600">
      Are you sure you want to delete this transaction?
    </div>

    <div class="flex space-x-3">
      <button
        (click)="close.emit()"
        class="flex-1 py-3 rounded-xl font-bold border bg-gray-50 border-gray-100 text-gray-500 hover:bg-gray-100 transition-all"
      >
        Cancel
      </button>

      <button
        (click)="confirmDelete.emit(); close.emit()"
        class="flex-1 py-3 rounded-xl font-bold bg-red-500 text-white shadow-lg shadow-red-100 hover:bg-red-600 active:scale-95 transition-all"
      >
        Delete
      </button>
    </div>
  </div>
</div>
