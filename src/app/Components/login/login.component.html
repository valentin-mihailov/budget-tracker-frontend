<div
  class="flex flex-col items-center justify-center min-h-screen bg-gray-50 space-y-6"
>
  <h1 class="text-3xl font-bold text-gray-800">Budget Tracking App</h1>

  <div class="w-full max-w-xs flex flex-col space-y-4">
    <input
      type="email"
      placeholder="YourEmail@gmail.com"
      [(ngModel)]="loginData.email"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <input
      type="password"
      placeholder="************"
      [(ngModel)]="loginData.password"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <div class="text-right text-sm">
      Dont have an account?
      <a
        routerLink="/register"
        class="text-blue-600 hover:text-black transition"
        >Register!</a
      >
    </div>

    <button
      class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
      (click)="login()"
    >
      Login
    </button>
  </div>
</div>
